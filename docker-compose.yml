version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: saga_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-saga_master_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Secur3P@ssw0rd!_123}
      POSTGRES_DB: ${POSTGRES_DB:-default_db}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - saga_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: saga_zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - saga_network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: saga_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - saga_network

  zipkin:
    image: openzipkin/zipkin
    container_name: saga_zipkin
    ports:
      - "9411:9411"
    networks:
      - saga_network

  orchestrator-service:
    build:
      context: ./orchestrator-service
      dockerfile: Dockerfile
    container_name: saga_orchestrator
    ports:
      - "8085:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=${POSTGRES_URL:-jdbc:postgresql://postgres:5432/default_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-saga_master_user}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-Secur3P@ssw0rd!_123}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=${ZIPKIN_URL:-http://zipkin:9411/api/v2/spans}
    depends_on:
      - kafka
      - postgres
      - zipkin
    networks:
      - saga_network

  flight-service:
    build:
      context: ./flight-service
      dockerfile: Dockerfile
    container_name: saga_flight
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=${POSTGRES_URL:-jdbc:postgresql://postgres:5432/default_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-saga_master_user}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-Secur3P@ssw0rd!_123}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=${ZIPKIN_URL:-http://zipkin:9411/api/v2/spans}
    depends_on:
      - kafka
      - postgres
      - zipkin
    networks:
      - saga_network

  hotel-service:
    build:
      context: ./hotel-service
      dockerfile: Dockerfile
    container_name: saga_hotel
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=${POSTGRES_URL:-jdbc:postgresql://postgres:5432/default_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-saga_master_user}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-Secur3P@ssw0rd!_123}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=${ZIPKIN_URL:-http://zipkin:9411/api/v2/spans}
    depends_on:
      - kafka
      - postgres
      - zipkin
    networks:
      - saga_network

  car-service:
    build:
      context: ./car-service
      dockerfile: Dockerfile
    container_name: saga_car
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=${POSTGRES_URL:-jdbc:postgresql://postgres:5432/default_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-saga_master_user}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-Secur3P@ssw0rd!_123}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=${ZIPKIN_URL:-http://zipkin:9411/api/v2/spans}
    depends_on:
      - kafka
      - postgres
      - zipkin
    networks:
      - saga_network

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: http://localhost:8085
    container_name: saga_dashboard
    ports:
      - "3000:80"
    depends_on:
      - orchestrator-service
    networks:
      - saga_network

networks:
  saga_network:
    driver: bridge
