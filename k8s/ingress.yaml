apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: saga-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  rules:
  - host: saga.local
    http:
      paths:
      - path: /api/trips/?(.*)
        pathType: Prefix
        backend:
          service:
            name: orchestrator-service
            port:
              number: 8080
